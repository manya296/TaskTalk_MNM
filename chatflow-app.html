<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatFlow — Business Workflow Automation</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --teal: #0e9f7e;
    --teal-dark: #0a7560;
    --teal-light: #e0f5ef;
    --teal-mid: #1bbf99;
    --navy: #0f1b2d;
    --navy2: #162235;
    --ink: #1a2535;
    --ink2: #2e3d52;
    --muted: #6b7a90;
    --border: rgba(14,159,126,0.18);
    --border2: rgba(255,255,255,0.08);
    --surface: #19253a;
    --surface2: #1f2f47;
    --surface3: #243550;
    --text: #e8edf4;
    --text2: #9aacc0;
    --text3: #5d7292;
    --success: #27c984;
    --warn: #f5a623;
    --error: #e85d5d;
    --order-color: #00d4aa;
    --query-color: #4facfe;
    --task-color: #a78bfa;
  }

  html, body, #root { height: 100%; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy);
    color: var(--text);
    overflow: hidden;
  }

  .app {
    display: grid;
    grid-template-columns: 240px 1fr 340px;
    grid-template-rows: 58px 1fr;
    height: 100vh;
    gap: 0;
  }

  /* ── Header ── */
  .header {
    grid-column: 1 / -1;
    background: var(--navy2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 12px;
    z-index: 10;
  }
  .logo-mark {
    width: 28px; height: 28px;
    background: var(--teal);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: #fff;
    font-family: 'Syne', sans-serif;
  }
  .logo-text {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 17px;
    color: var(--text);
    letter-spacing: -0.3px;
  }
  .logo-text span { color: var(--teal); }
  .header-tag {
    margin-left: 8px;
    font-size: 11px;
    background: rgba(14,159,126,0.15);
    color: var(--teal);
    border: 1px solid rgba(14,159,126,0.3);
    padding: 2px 8px;
    border-radius: 100px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.5px;
  }
  .header-right {
    margin-left: auto;
    display: flex; align-items: center; gap: 16px;
  }
  .status-dot {
    width: 7px; height: 7px;
    background: var(--success);
    border-radius: 50%;
    box-shadow: 0 0 6px var(--success);
    animation: pulse-dot 2s infinite;
  }
  @keyframes pulse-dot {
    0%,100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .status-label { font-size: 12px; color: var(--text2); }

  /* ── Sidebar ── */
  .sidebar {
    background: var(--navy2);
    border-right: 1px solid var(--border);
    padding: 20px 16px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .sidebar-section-title {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 1.2px;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .quick-btn {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    margin-bottom: 6px;
  }
  .quick-btn:hover { background: var(--surface2); border-color: var(--teal); }
  .quick-btn-intent {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.8px;
    color: var(--teal);
    margin-bottom: 4px;
  }
  .quick-btn-text {
    font-size: 12px;
    color: var(--text2);
    line-height: 1.4;
  }
  .inv-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 7px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .inv-name { font-size: 12px; color: var(--text2); }
  .inv-stock {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--teal);
    background: rgba(14,159,126,0.1);
    padding: 2px 7px;
    border-radius: 5px;
  }

  /* ── Chat Area ── */
  .chat-area {
    display: flex;
    flex-direction: column;
    background: var(--navy);
    overflow: hidden;
  }
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 28px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 4px; }

  .msg-row {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    animation: slide-up 0.25s ease;
  }
  @keyframes slide-up {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .msg-row.user { flex-direction: row-reverse; }

  .avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600;
    flex-shrink: 0;
  }
  .avatar.user { background: var(--teal); color: #fff; font-family: 'Syne', sans-serif; }
  .avatar.ai   { background: var(--surface3); color: var(--teal); font-family: 'Syne', sans-serif; }

  .bubble {
    max-width: 480px;
    padding: 12px 16px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.6;
  }
  .bubble.user {
    background: var(--teal);
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .bubble.ai {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }
  .msg-time {
    font-size: 10px;
    color: var(--text3);
    margin-top: 4px;
    font-family: 'DM Mono', monospace;
  }

  /* ── Typing indicator ── */
  .typing-bubble {
    display: flex; gap: 5px; align-items: center;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    border-bottom-left-radius: 4px;
    width: fit-content;
  }
  .typing-dot {
    width: 6px; height: 6px;
    background: var(--teal);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%,60%,100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
  }

  /* ── Input ── */
  .input-area {
    padding: 16px 28px 20px;
    background: var(--navy2);
    border-top: 1px solid var(--border);
  }
  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  .chat-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    color: var(--text);
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    resize: none;
    outline: none;
    min-height: 46px;
    max-height: 140px;
    transition: border-color 0.2s;
  }
  .chat-input:focus { border-color: var(--teal); }
  .chat-input::placeholder { color: var(--text3); }
  .send-btn {
    width: 46px; height: 46px;
    background: var(--teal);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .send-btn:hover { background: var(--teal-dark); transform: scale(1.05); }
  .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .send-btn svg { width: 18px; height: 18px; fill: #fff; }

  .hint-row {
    display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap;
  }
  .hint-chip {
    font-size: 11px;
    padding: 4px 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 100px;
    color: var(--text3);
    cursor: pointer;
    transition: all 0.15s;
  }
  .hint-chip:hover { border-color: var(--teal); color: var(--teal); }

  /* ── Right Panel ── */
  .right-panel {
    background: var(--navy2);
    border-left: 1px solid var(--border);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }
  .right-panel::-webkit-scrollbar { width: 4px; }
  .right-panel::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 4px; }
  .panel-header {
    padding: 16px 18px 12px;
    border-bottom: 1px solid var(--border);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--text2);
    letter-spacing: 0.2px;
  }

  /* ── Structured Data Card ── */
  .data-card {
    margin: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    animation: slide-up 0.3s ease;
  }
  .data-card-header {
    padding: 10px 14px;
    background: rgba(14,159,126,0.1);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .intent-badge {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 1px;
    padding: 3px 9px;
    border-radius: 100px;
    font-weight: 500;
  }
  .intent-ORDER  { background: rgba(0,212,170,0.15); color: #00d4aa; border: 1px solid rgba(0,212,170,0.3); }
  .intent-QUERY  { background: rgba(79,172,254,0.15); color: #4facfe; border: 1px solid rgba(79,172,254,0.3); }
  .intent-TASK   { background: rgba(167,139,250,0.15); color: #a78bfa; border: 1px solid rgba(167,139,250,0.3); }
  .intent-CANCEL { background: rgba(232,93,93,0.15); color: #e85d5d; border: 1px solid rgba(232,93,93,0.3); }
  .intent-UNKNOWN{ background: rgba(107,122,144,0.15); color: #6b7a90; border: 1px solid rgba(107,122,144,0.3); }

  .confidence-bar {
    flex: 1;
    height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    overflow: hidden;
  }
  .confidence-fill {
    height: 100%;
    background: var(--teal);
    border-radius: 2px;
    transition: width 0.5s ease;
  }
  .conf-pct { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }

  .entity-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
  }
  .entity-cell {
    background: var(--surface);
    padding: 10px 14px;
  }
  .entity-key {
    font-size: 10px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.8px;
    margin-bottom: 3px;
    text-transform: uppercase;
  }
  .entity-val {
    font-size: 13px;
    color: var(--text);
    font-weight: 500;
  }
  .entity-val.null { color: var(--text3); font-style: italic; font-size: 12px; }

  /* ── Workflow Steps ── */
  .workflow-section { padding: 14px; }
  .wf-title {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 1.2px;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .wf-step {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
    align-items: flex-start;
  }
  .wf-icon {
    width: 26px; height: 26px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    flex-shrink: 0;
    font-family: 'DM Mono', monospace;
    font-weight: 500;
  }
  .wf-icon.completed { background: rgba(39,201,132,0.15); color: var(--success); border: 1px solid rgba(39,201,132,0.3); }
  .wf-icon.passed    { background: rgba(39,201,132,0.15); color: var(--success); border: 1px solid rgba(39,201,132,0.3); }
  .wf-icon.warning   { background: rgba(245,166,35,0.15); color: var(--warn); border: 1px solid rgba(245,166,35,0.3); }
  .wf-icon.not_found { background: rgba(107,122,144,0.15); color: var(--muted); border: 1px solid rgba(107,122,144,0.3); }

  .wf-step-body { flex: 1; }
  .wf-step-name {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 3px;
  }
  .wf-step-detail {
    font-size: 11px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    line-height: 1.5;
  }
  .wf-connector {
    width: 1px; height: 10px;
    background: var(--border);
    margin-left: 12px;
    margin-bottom: 0;
  }

  /* ── Invoice Card ── */
  .invoice-card {
    margin: 0 14px 14px;
    background: rgba(14,159,126,0.06);
    border: 1px solid rgba(14,159,126,0.25);
    border-radius: 12px;
    padding: 14px;
  }
  .invoice-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 12px;
  }
  .invoice-title {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--teal);
  }
  .invoice-id {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    color: var(--text3);
  }
  .invoice-row {
    display: flex; justify-content: space-between;
    font-size: 12px;
    padding: 4px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    color: var(--text2);
  }
  .invoice-total {
    display: flex; justify-content: space-between;
    font-size: 14px;
    font-weight: 600;
    padding-top: 10px;
    color: var(--teal);
    font-family: 'Syne', sans-serif;
  }

  /* ── Empty state ── */
  .empty-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 30px;
    opacity: 0.5;
  }
  .empty-icon {
    width: 48px; height: 48px;
    border-radius: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  .empty-text { font-size: 13px; color: var(--text3); text-align: center; line-height: 1.6; }

  /* ── Welcome ── */
  .welcome-msg {
    display: flex; flex-direction: column; align-items: center;
    text-align: center; padding: 40px 20px; gap: 10px;
    opacity: 0.85;
  }
  .welcome-logo {
    width: 52px; height: 52px;
    background: rgba(14,159,126,0.15);
    border: 1px solid rgba(14,159,126,0.3);
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 22px; font-weight: 800;
    color: var(--teal);
    margin-bottom: 6px;
  }
  .welcome-title {
    font-family: 'Syne', sans-serif;
    font-size: 18px; font-weight: 700;
    color: var(--text);
  }
  .welcome-sub { font-size: 13px; color: var(--text2); max-width: 300px; }

  /* ── Pipeline viz ── */
  .pipeline {
    display: flex; align-items: center; gap: 0;
    padding: 0 14px 14px;
    overflow-x: auto;
  }
  .pipe-node {
    display: flex; flex-direction: column; align-items: center;
    min-width: 55px;
  }
  .pipe-circle {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text3);
    transition: all 0.4s;
  }
  .pipe-circle.active {
    background: rgba(14,159,126,0.2);
    border-color: var(--teal);
    color: var(--teal);
  }
  .pipe-label {
    font-size: 9px; color: var(--text3); margin-top: 4px;
    font-family: 'DM Mono', monospace;
    text-align: center; letter-spacing: 0.5px;
    text-transform: uppercase; white-space: nowrap;
  }
  .pipe-arrow {
    flex-shrink: 0;
    color: var(--text3);
    font-size: 12px;
    margin: 0 2px;
    padding-bottom: 14px;
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useEffect } = React;

// ── Demo response engine (no backend needed) ──────────────────
function generateDemoResponse(message) {
  const lower = message.toLowerCase();
  const now = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

  // Parse what we can from the message
  const qtyMatch = message.match(/\b(\d+)\b/);
  const qty = qtyMatch ? parseInt(qtyMatch[1]) : 3;

  const items = ['notebooks','pens','paper ream','markers','folders','staplers','sticky notes','laptop bags'];
  const foundItem = items.find(i => lower.includes(i.split(' ')[0])) || 'notebooks';

  const names = ['Rahul','Priya','Arjun','Sneha','Meera','Vikram','Anjali','Dev'];
  const toMatch = message.match(/\bto\s+([A-Z][a-z]+)/);
  const customer = toMatch ? toMatch[1] : names.find(n => message.includes(n)) || 'Rahul';

  const dateWords = ['today','tomorrow','monday','tuesday','wednesday','thursday','friday','next week','asap'];
  const foundDate = dateWords.find(d => lower.includes(d)) || 'tomorrow';

  const prices = { 'notebooks':45, 'pens':10, 'paper ream':200, 'markers':25, 'folders':30, 'staplers':120, 'sticky notes':35, 'laptop bags':850 };
  const unitPrice = prices[foundItem] || 50;
  const total = qty * unitPrice;

  const orderId = 'ORD-' + Math.random().toString(36).slice(2,7).toUpperCase();
  const invoiceId = 'INV-' + Math.random().toString(36).slice(2,7).toUpperCase();

  if (lower.includes('check') || lower.includes('status') || lower.includes('how many') || lower.includes('stock') || lower.includes('pending')) {
    return {
      ai: { intent: 'QUERY', entities: { item: foundItem, quantity: null, customer: null, date: null }, confidence: 0.88,
        reply: `Found recent activity for ${foundItem}. Here's the latest status.` },
      workflow: { type: 'QUERY', success: true,
        actions: [{ step:1, action:'QUERY_RESOLVED', status:'completed', details:{ found: 3, message: `3 recent orders found` } }],
        summary: 'Query completed — 3 records found' },
      invoice: null, time: now
    };
  }

  if (lower.includes('cancel')) {
    return {
      ai: { intent: 'CANCEL', entities: { item: foundItem, quantity: qty, customer, date: foundDate }, confidence: 0.91,
        reply: `Cancellation request for ${customer}'s order has been recorded. Our team will process it shortly.` },
      workflow: { type: 'CANCEL', success: true,
        actions: [{ step:1, action:'CANCEL_PROCESSED', status:'completed', details:{ message:'Cancellation request logged' } }],
        summary: 'Cancellation recorded' },
      invoice: null, time: now
    };
  }

  if (lower.includes('remind') || lower.includes('follow') || lower.includes('call') || lower.includes('meeting')) {
    const taskId = 'TSK-' + Math.random().toString(36).slice(2,6).toUpperCase();
    return {
      ai: { intent: 'TASK', entities: { item: null, quantity: null, customer, date: foundDate, notes: message }, confidence: 0.79,
        reply: `Task logged for ${foundDate}. I'll make sure the team is notified.` },
      workflow: { type: 'TASK', success: true,
        actions: [{ step:1, action:'TASK_LOGGED', status:'completed', details:{ taskId, dueDate: foundDate } }],
        summary: `Task ${taskId} logged` },
      invoice: null, time: now
    };
  }

  // Default: ORDER
  const stockAvail = Math.floor(Math.random() * 80) + qty + 10;
  return {
    ai: { intent: 'ORDER', entities: { item: foundItem, quantity: qty, customer, date: foundDate, price: unitPrice, location: null, notes: null }, confidence: 0.94 + Math.random()*0.05,
      reply: `Order confirmed! ${qty}x ${foundItem} for ${customer}, delivery ${foundDate}. Invoice ${invoiceId} generated. ✅` },
    workflow: {
      type: 'ORDER', success: true,
      order: { id: orderId, customer, item: foundItem, quantity: qty, unitPrice, totalAmount: total, deliveryDate: foundDate, status: 'confirmed' },
      invoice: { invoiceId, orderId, customer, item: foundItem, quantity: qty, unitPrice, totalAmount: total, status: 'generated' },
      actions: [
        { step:1, action:'INVENTORY_CHECK', status:'passed', details:{ item:foundItem, requested:qty, available:stockAvail, sufficient:true } },
        { step:2, action:'STOCK_UPDATE', status:'completed', details:{ reduced:qty, remaining:stockAvail-qty } },
        { step:3, action:'ORDER_CREATED', status:'completed', details:{ orderId, customer, item:foundItem, quantity:qty, totalAmount:total } },
        { step:4, action:'INVOICE_GENERATED', status:'completed', details:{ invoiceId } },
        { step:5, action:'CONFIRMATION_SENT', status:'completed', details:{ channel:'chat' } },
      ],
      summary: `Order ${orderId} → ${qty}x ${foundItem} → ${customer} | ₹${total}`
    },
    invoice: { invoiceId, orderId, customer, item: foundItem, quantity: qty, unitPrice, totalAmount: total },
    time: now
  };
}

// ── Action label map ──────────────────────────────────────────
const ACTION_LABELS = {
  INVENTORY_CHECK: 'Inventory Check',
  STOCK_UPDATE: 'Stock Updated',
  ORDER_CREATED: 'Order Created',
  INVOICE_GENERATED: 'Invoice Generated',
  CONFIRMATION_SENT: 'Confirmation Sent',
  QUERY_RESOLVED: 'Query Resolved',
  TASK_LOGGED: 'Task Logged',
  CANCEL_PROCESSED: 'Cancellation Processed',
};

const ACTION_ICONS = {
  INVENTORY_CHECK: '⬡', STOCK_UPDATE: '↓', ORDER_CREATED: '✦',
  INVOICE_GENERATED: '◈', CONFIRMATION_SENT: '✓', QUERY_RESOLVED: '◎',
  TASK_LOGGED: '◉', CANCEL_PROCESSED: '✕',
};

const QUICK_DEMOS = [
  { label: 'ORDER', text: 'Send 5 notebooks to Rahul tomorrow' },
  { label: 'ORDER', text: 'Order 10 pens for Priya today' },
  { label: 'QUERY', text: 'Check stock status for notebooks' },
  { label: 'TASK', text: 'Remind Arjun to follow up with Meera on Monday' },
  { label: 'ORDER', text: 'Ship 2 laptop bags to Anjali next week' },
  { label: 'CANCEL', text: 'Cancel last order for Vikram' },
];

const INVENTORY_PREVIEW = [
  { item: 'notebooks', stock: 120 },
  { item: 'pens', stock: 350 },
  { item: 'paper ream', stock: 80 },
  { item: 'markers', stock: 200 },
  { item: 'folders', stock: 150 },
];

const PIPELINE_STEPS = ['Message', 'NLP', 'Structure', 'Workflow', 'Execute'];

// ── Main App ──────────────────────────────────────────────────
function App() {
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [activeResult, setActiveResult] = useState(null);
  const [pipelineStep, setPipelineStep] = useState(-1);
  const [inventory, setInventory] = useState(INVENTORY_PREVIEW);
  const messagesEndRef = useRef(null);
  const inputRef = useRef(null);

  useEffect(() => {
    messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [messages, loading]);

  async function sendMessage(text) {
    const msg = text || input.trim();
    if (!msg || loading) return;
    setInput('');

    const userMsg = { id: Date.now(), role: 'user', text: msg, time: new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) };
    setMessages(prev => [...prev, userMsg]);
    setLoading(true);
    setPipelineStep(0);

    // Animate pipeline
    for (let i = 0; i <= 4; i++) {
      await new Promise(r => setTimeout(r, 280));
      setPipelineStep(i);
    }

    await new Promise(r => setTimeout(r, 300));

    const result = generateDemoResponse(msg);

    // Update inventory if order
    if (result.workflow.type === 'ORDER' && result.workflow.order) {
      const { item, quantity } = result.workflow.order;
      setInventory(prev => prev.map(i =>
        i.item === item ? { ...i, stock: Math.max(0, i.stock - quantity) } : i
      ));
    }

    const aiMsg = {
      id: Date.now() + 1, role: 'ai', text: result.ai.reply,
      time: result.time, result
    };
    setMessages(prev => [...prev, aiMsg]);
    setActiveResult(result);
    setLoading(false);
    setPipelineStep(-1);
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  const lastResult = activeResult;

  return (
    <div className="app">
      {/* ── Header ── */}
      <header className="header">
        <div className="logo-mark">CF</div>
        <div className="logo-text">Chat<span>Flow</span></div>
        <div className="header-tag">AI-POWERED</div>
        <div className="header-right">
          <div className="status-dot" />
          <div className="status-label">All systems operational</div>
        </div>
      </header>

      {/* ── Sidebar ── */}
      <aside className="sidebar">
        <div>
          <div className="sidebar-section-title">Quick Demo</div>
          {QUICK_DEMOS.map((q, i) => (
            <button key={i} className="quick-btn" onClick={() => sendMessage(q.text)}>
              <div className="quick-btn-intent">{q.label}</div>
              <div className="quick-btn-text">{q.text}</div>
            </button>
          ))}
        </div>
        <div>
          <div className="sidebar-section-title">Live Inventory</div>
          {inventory.map((item, i) => (
            <div key={i} className="inv-item">
              <div className="inv-name">{item.item}</div>
              <div className="inv-stock">{item.stock}</div>
            </div>
          ))}
        </div>
      </aside>

      {/* ── Chat Area ── */}
      <main className="chat-area">
        <div className="messages">
          {messages.length === 0 && (
            <div className="welcome-msg">
              <div className="welcome-logo">CF</div>
              <div className="welcome-title">Chat to Business Automation</div>
              <div className="welcome-sub">Type any business instruction in plain English. I'll extract the data and trigger the right workflow.</div>
            </div>
          )}
          {messages.map(msg => (
            <div key={msg.id} className={`msg-row ${msg.role}`}>
              <div className={`avatar ${msg.role}`}>{msg.role === 'user' ? 'U' : 'AI'}</div>
              <div>
                <div className={`bubble ${msg.role}`}>{msg.text}</div>
                <div className="msg-time" style={{ textAlign: msg.role === 'user' ? 'right' : 'left' }}>{msg.time}</div>
              </div>
            </div>
          ))}
          {loading && (
            <div className="msg-row ai">
              <div className="avatar ai">AI</div>
              <div className="typing-bubble">
                <div className="typing-dot" /><div className="typing-dot" /><div className="typing-dot" />
              </div>
            </div>
          )}
          <div ref={messagesEndRef} />
        </div>

        {/* Pipeline Viz */}
        {(loading || pipelineStep >= 0) && (
          <div style={{ padding: '8px 28px 0', borderTop: '1px solid var(--border)' }}>
            <div style={{ fontSize: 10, fontFamily: "'DM Mono', monospace", color: 'var(--text3)', letterSpacing: '1px', textTransform: 'uppercase', marginBottom: 8 }}>
              processing pipeline
            </div>
            <div className="pipeline" style={{ padding: '0 0 12px' }}>
              {PIPELINE_STEPS.map((step, i) => (
                <React.Fragment key={i}>
                  <div className="pipe-node">
                    <div className={`pipe-circle ${i <= pipelineStep ? 'active' : ''}`}>{i+1}</div>
                    <div className="pipe-label">{step}</div>
                  </div>
                  {i < PIPELINE_STEPS.length - 1 && <div className="pipe-arrow">→</div>}
                </React.Fragment>
              ))}
            </div>
          </div>
        )}

        {/* Input */}
        <div className="input-area">
          <div className="input-row">
            <textarea
              ref={inputRef}
              className="chat-input"
              value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={handleKey}
              placeholder="Type an order, query, or task in plain English..."
              rows={1}
              disabled={loading}
            />
            <button className="send-btn" onClick={() => sendMessage()} disabled={loading || !input.trim()}>
              <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
          </div>
          <div className="hint-row">
            {['Send 5 notebooks to Rahul', 'Check stock status', 'Cancel last order'].map((h, i) => (
              <div key={i} className="hint-chip" onClick={() => { setInput(h); inputRef.current?.focus(); }}>{h}</div>
            ))}
          </div>
        </div>
      </main>

      {/* ── Right Panel ── */}
      <aside className="right-panel">
        <div className="panel-header">Extracted Data & Workflow</div>

        {!lastResult ? (
          <div className="empty-panel">
            <div className="empty-icon">◈</div>
            <div className="empty-text">Send a message to see real-time AI extraction and workflow execution here</div>
          </div>
        ) : (
          <>
            {/* Structured Data */}
            <div className="data-card">
              <div className="data-card-header">
                <div className={`intent-badge intent-${lastResult.ai.intent}`}>{lastResult.ai.intent}</div>
                <div className="confidence-bar">
                  <div className="confidence-fill" style={{ width: `${Math.round(lastResult.ai.confidence * 100)}%` }} />
                </div>
                <div className="conf-pct">{Math.round(lastResult.ai.confidence * 100)}%</div>
              </div>
              <div className="entity-grid">
                {Object.entries(lastResult.ai.entities).filter(([k]) => !['price','location','notes'].includes(k)).map(([key, val]) => (
                  <div key={key} className="entity-cell">
                    <div className="entity-key">{key}</div>
                    <div className={`entity-val ${val === null ? 'null' : ''}`}>{val !== null ? String(val) : '—'}</div>
                  </div>
                ))}
              </div>
            </div>

            {/* Workflow steps */}
            <div className="workflow-section">
              <div className="wf-title">Workflow Actions</div>
              {lastResult.workflow.actions.map((action, i) => (
                <React.Fragment key={i}>
                  <div className="wf-step">
                    <div className={`wf-icon ${action.status}`}>
                      {ACTION_ICONS[action.action] || action.step}
                    </div>
                    <div className="wf-step-body">
                      <div className="wf-step-name">{ACTION_LABELS[action.action] || action.action}</div>
                      <div className="wf-step-detail">
                        {action.action === 'INVENTORY_CHECK' && action.details.sufficient !== undefined &&
                          `${action.details.item} — ${action.details.available} in stock`}
                        {action.action === 'STOCK_UPDATE' &&
                          `Reduced by ${action.details.reduced} → ${action.details.remaining} remaining`}
                        {action.action === 'ORDER_CREATED' &&
                          `${action.details.orderId} • ₹${action.details.totalAmount}`}
                        {action.action === 'INVOICE_GENERATED' &&
                          `${action.details.invoiceId || JSON.stringify(action.details).slice(0,30)}`}
                        {action.action === 'CONFIRMATION_SENT' && 'Sent via chat channel'}
                        {action.action === 'QUERY_RESOLVED' && `${action.details.found} record(s) found`}
                        {action.action === 'TASK_LOGGED' && `${action.details.taskId || ''} logged`}
                        {action.action === 'CANCEL_PROCESSED' && 'Request recorded'}
                      </div>
                    </div>
                  </div>
                  {i < lastResult.workflow.actions.length - 1 && <div className="wf-connector" />}
                </React.Fragment>
              ))}
            </div>

            {/* Invoice */}
            {lastResult.invoice && (
              <div className="invoice-card">
                <div className="invoice-header">
                  <div className="invoice-title">Invoice</div>
                  <div className="invoice-id">{lastResult.invoice.invoiceId}</div>
                </div>
                <div className="invoice-row"><span>Item</span><span>{lastResult.invoice.item}</span></div>
                <div className="invoice-row"><span>Customer</span><span>{lastResult.invoice.customer}</span></div>
                <div className="invoice-row"><span>Qty × Unit</span><span>{lastResult.invoice.quantity} × ₹{lastResult.invoice.unitPrice}</span></div>
                <div className="invoice-total"><span>Total</span><span>₹{lastResult.invoice.totalAmount}</span></div>
              </div>
            )}

            {/* Summary */}
            <div style={{ margin: '0 14px 14px', padding: '10px 14px', background: 'rgba(14,159,126,0.06)', border: '1px solid rgba(14,159,126,0.2)', borderRadius: 10, fontSize: 12, color: 'var(--text2)', fontFamily: "'DM Mono', monospace", lineHeight: 1.6 }}>
              {lastResult.workflow.summary}
            </div>
          </>
        )}
      </aside>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
